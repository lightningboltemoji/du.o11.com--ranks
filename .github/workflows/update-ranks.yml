name: Update Fortnite Ranks

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: update-ranks

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv python install

      - name: Write device auth credentials
        run: printenv DEVICE_AUTH_JSON > .device_auth.json
        env:
          DEVICE_AUTH_JSON: ${{ secrets.DEVICE_AUTH_JSON }}

      - run: uv run main.py

      - name: Commit and push ranks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ranks.json
          git diff --cached --quiet || git commit -m "Update ranks" && git push
