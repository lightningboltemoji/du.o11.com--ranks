name: Update Fortnite Ranks

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: update-ranks

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv python install

      - name: Download existing ranks.json from R2
        run: |
          npx wrangler r2 object get "$R2_BUCKET_NAME/ranks.json" --file ranks.json || echo "No existing ranks.json found, starting fresh"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Write device auth credentials
        run: printenv DEVICE_AUTH_JSON > .device_auth.json
        env:
          DEVICE_AUTH_JSON: ${{ secrets.DEVICE_AUTH_JSON }}

      - run: uv run main.py

      - name: Upload ranks.json to R2
        run: |
          npx wrangler r2 object put "$R2_BUCKET_NAME/ranks.json" --file ranks.json --content-type application/json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
